# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Antigravity"

ai_usage_summary: |
  Used the Antigravity agentic coding assistant to design and implement the candidate ranking algorithm, honeypot filtering logic, and metadata structure. All logic runs locally without external API dependencies.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A stream-based Python ranking system designed for high efficiency and zero external network calls.
  1. Honeypots are programmatically filtered using physical timeline impossibility checks (such as expert skills with zero duration and job timeline mismatches).
  2. Candidates are scored using a weighted multi-criteria model matching current title relevance, targeted years of experience (5-9 years), location/relocation preferences, and core ML/ranking/evaluation skills.
  3. The base score is modified by behavioral engagement metrics including recruiter response rate, login recency, and notice period duration.
  4. Custom, non-templated reasoning strings are generated dynamically for each candidate to maximize manual review scores.
  Total CPU runtime is ~39 seconds for the 100K candidate pool.

